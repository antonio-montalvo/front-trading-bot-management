<div class="dialog-backdrop">
  <div class="dialog">
    <h3>{{ title() }}</h3>
    <p>{{ message() }}</p>
    <div class="dialog-actions">
      <button class="btn btn-cancel" (click)="cancel()">Cancelar</button>
      <button class="btn btn-confirm" (click)="confirm()">Confirmar</button>
    </div>
  </div>
</div>
